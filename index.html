<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taiyakidos | リンク一覧</title>
    <meta name="description"
        content="Taiyakidos の各種SNSリンクまとめページです。YouTube・X・Instagram・Threads・Misskey・note・Discord など。" />

    <!-- OGP -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Taiyakidos | リンク一覧" />
    <meta property="og:description"
        content="Taiyakidos の各種SNSリンクまとめページです。YouTube・X・Instagram・Threads・Misskey・note・Discord など。" />
    <meta property="og:image" content="./assets/images/header.png" />
    <meta property="og:url" content="https://taiyakidos.github.io/linklist/" />
    <meta property="og:site_name" content="Taiyakidos Links" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Taiyakidos | リンク一覧" />
    <meta name="twitter:description" content="Taiyakidos の各種SNSリンクまとめページです。" />
    <meta name="twitter:image" content="./assets/images/header.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="./ico/YouTube.png" />

    <!-- Google Analytics （GA4） -->
    <!-- 測定IDは下記metaタグに入力してください -->
    <meta name="ga-id" content="G-XXXXXXXXXX" />
    <script>
        (function(){
            const meta = document.querySelector('meta[name="ga-id"]');
            const GA_ID = meta ? meta.content.trim() : '';
            if (!GA_ID || GA_ID === 'G-HM9CKPBG0X') return;
            const s = document.createElement('script');
            s.async = true;
            s.src = `https://www.googletagmanager.com/gtag/js?id=${GA_ID}`;
            document.head.appendChild(s);
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', GA_ID);
        })();
    </script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <header class="site-header">
        <img class="site-header__img" src="./assets/images/header.png" alt="Taiyakidos Header" />
    </header>
    <main class="container" id="main">
        <!-- プロフィール -->
        <section class="profile" id="profile">
            <img class="profile__avatar" src="./assets/images/avatar.jpg" alt="Taiyakidos のプロフィール画像" width="96" height="96" />
            <h1 class="profile__name">Taiyakidos</h1>
            <p class="profile__bio">Taiyakidosの各種SNSリンクまとめ<br>お気軽にフォローしてね！</p>
        </section>

        <!-- リンク一覧（script.js により動的生成） -->
        <nav class="links" id="links" aria-label="SNSリンク一覧"></nav>
    </main>

    <footer class="footer">
        <p id="copyright">&copy; <span id="year">2025</span> Taiyakidos</p>
    </footer>

    <script src="./script.js"></script>
</body>

</html>
