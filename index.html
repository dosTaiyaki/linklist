<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <link rel="icon" type="image/jpeg" href="assets/images/avatar.jpg">
  <link rel="apple-touch-icon" href="assets/images/avatar.jpg">

</head>

<body>
  <div class="banner">
    <img src="assets/images/header.png" alt="Taiyaki banner">
  </div>

  <div class="container">
    <header class="header-wrapper">
      <img src="assets/images/avatar.jpg" alt="プロフィール画像" class="profile-img">
      <h1>Taiyakidos</h1>
      <p class="subtitle">リンク集</p>
    </header>

    <main>
      <div id="link-container">
        <section class="link-section">
          <div class="link-grid">
            <a href="https://x.com/Taiyakidos" target="_blank" rel="me noopener noreferrer"
              class="link-card twitter">
              <img class="sns-icon" src="ico/X.png" alt="X">
              <span class="link-text">X (main)</span>
            </a>
            <a href="https://www.instagram.com/taiyakidos" target="_blank" rel="me noopener noreferrer"
              class="link-card instagram">
              <img class="sns-icon" src="ico/Instagram.png" alt="Instagram">
              <span class="link-text">Instagram</span>
            </a>
            <a href="https://www.youtube.com/@Taiyakidos" target="_blank" rel="me noopener noreferrer"
              class="link-card youtube">
              <img class="sns-icon" src="ico/YouTube.png" alt="YouTube">
              <span class="link-text">YouTube</span>
            </a>
            <a href="https://discord.gg/" target="_blank" rel="me noopener noreferrer" class="link-card discord">
              <img class="sns-icon" src="ico/Discord.png" alt="Discord">
              <span class="link-text">Discord</span>
            </a>
            <a href="https://note.com/" target="_blank" rel="me noopener noreferrer" class="link-card note">
              <img class="sns-icon" src="ico/note.png" alt="note">
              <span class="link-text">note</span>
            </a>
            <a href="https://misskey.io/" target="_blank" rel="me noopener noreferrer" class="link-card misskey">
              <img class="sns-icon" src="ico/Misskey.png" alt="Misskey">
              <span class="link-text">Misskey</span>
            </a>
            <a href="https://www.threads.net/" target="_blank" rel="me noopener noreferrer" class="link-card threads">
              <img class="sns-icon" src="ico/Threads.png" alt="Threads">
              <span class="link-text">Threads</span>
            </a>
            <a href="mailto:hello@example.com" class="link-card mail">
              <img class="sns-icon" src="ico/mail.svg" alt="Mail">
              <span class="link-text">Mail</span>
            </a>
          </div>
        </section>
      </div>
    </main>

    <footer>
      <span>© <span id="year"></span> Taiyakidos</span>
    </footer>
  </div>

  <script src="js/scriptsapp.js" defer></script>
</body>
